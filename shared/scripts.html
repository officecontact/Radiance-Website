<script src="webassets/js/jquery.min.js"></script>
<script src="assets/js/radiance.js"></script>
<script>function faqToggle(el){var a=el.nextElementSibling;var isOpen=a.style.display==='block';el.closest('.faq-section,.faq-list').querySelectorAll('.faq-a').forEach(function(x){x.style.display='none';});el.closest('.faq-section,.faq-list').querySelectorAll('.faq-icon').forEach(function(x){x.textContent='+';});if(!isOpen){a.style.display='block';el.querySelector('.faq-icon').textContent='−';}}</script>

<script>
function showMore(sectionId, count) {
  var btn = document.getElementById('btn-' + sectionId);
  if (!btn) return;
  var section = btn.closest('section');
  if (!section) return;
  var cards = section.querySelectorAll('.spice-prod-card');
  var expanded = btn.getAttribute('aria-expanded') === 'true';
  var LIMIT = 6;
  cards.forEach(function(card, i) {
    if (i >= LIMIT) card.style.display = expanded ? 'none' : '';
  });
  btn.setAttribute('aria-expanded', String(!expanded));
  btn.innerHTML = expanded
    ? '<i class="fas fa-th"></i> Show All ' + count + ' Products <i class="fas fa-chevron-down"></i>'
    : '<i class="fas fa-th"></i> Show Less <i class="fas fa-chevron-up"></i>';
}

document.addEventListener('DOMContentLoaded', function() {
  var LIMIT = 6;
  document.querySelectorAll('.subcat-section').forEach(function(section) {
    var cards = section.querySelectorAll('.spice-prod-card');
    var total = cards.length;
    cards.forEach(function(card, i) {
      if (i >= LIMIT) card.style.display = 'none';
    });
    var btn = section.querySelector('.btn-show-more');
    if (total <= LIMIT && btn) btn.style.display = 'none';
    if (total > LIMIT && !btn) {
      var actions = section.querySelector('.subcat-actions');
      if (actions) {
        var sectionId = section.id;
        var newBtn = document.createElement('button');
        newBtn.className = 'btn-show-more';
        newBtn.id = 'btn-' + sectionId;
        newBtn.setAttribute('aria-expanded', 'false');
        newBtn.innerHTML = '<i class="fas fa-th"></i> Show All ' + total + ' Products <i class="fas fa-chevron-down"></i>';
        newBtn.onclick = function() { showMore(sectionId, total); };
        actions.insertBefore(newBtn, actions.firstChild);
      }
    }
  });
  var navLinks = document.querySelectorAll('.subcat-nav-link');
  navLinks.forEach(function(link) {
    link.addEventListener('click', function() {
      navLinks.forEach(function(l) { l.classList.remove('is-active'); });
      this.classList.add('is-active');
    });
  });
  var sections = document.querySelectorAll('.subcat-section');
  if (sections.length && navLinks.length) {
    window.addEventListener('scroll', function() {
      var scrollPos = window.scrollY + 150;
      sections.forEach(function(section, i) {
        var top = section.offsetTop;
        var bottom = top + section.offsetHeight;
        if (scrollPos >= top && scrollPos < bottom && navLinks[i]) {
          navLinks.forEach(function(l) { l.classList.remove('is-active'); });
          navLinks[i].classList.add('is-active');
        }
      });
    });
  }
});
</script>
</body>
</html>
